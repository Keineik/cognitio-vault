name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Install dependencies
        run: |
          npm install
          hugo mod tidy

      - name: Determine baseURL and Build
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          LOWER_OWNER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          LOWER_REPO=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')

          if [ "$LOWER_REPO" = "$LOWER_OWNER.github.io" ]; then
            BASE_URL="https://$OWNER.github.io/"
          else
            BASE_URL="https://$OWNER.github.io/$REPO/"
          fi

          echo "Building site with baseURL: $BASE_URL"
          npm run build:production -- --baseURL "$BASE_URL"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
